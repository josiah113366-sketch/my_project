name: Push 기반 CI/CD 테스트 

# container 브랜치에서 push 이벤트(리슨->on)가 발생되면 아래 설정한 내용대로 작동한다 !!! 
on:
  push:
    branches: ["container"]

jobs:
  # app 관련 이미지 생성 허브에 푸시 (소스 코드/리소스 모두 포함되어 있음)
  ci:
    runs-on: ubuntu-latest

    steps:
      # 체크 아웃, 소스 코드를 ci 서버에 다운 
      - name: 코드 checkout 
        uses: actions/checkout@v3

      # 도커 허브 로그인 -> ID/PW 
      # 시크릿 변수로 DOCKER_NAME, DOCKER_PASSWORD 생성 
      - name: Docker hub login
        uses: docker/login-action@v2
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # fastapi app에 대한 이미지 생성(빌드)? 푸시? 동시 진행 
      - name: Build and Push fastapi app
        uses: docker/build-push-action@v4
        with: 
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:1.0

      # 사용자명/nginx-proxy:1.0 형태로 이미지 빌드 -> 푸시 
      - name: Build and Push nginx proxy
        uses: docker/build-push-action@v4
        with: 
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:1.0

  # EC2에 docker-compose.yml, 설정 파일 등 copy, 도커 컴포즈 작동 
  # cd: